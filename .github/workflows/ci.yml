name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Unit tests ───────────────────────────────────────
  unit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npx vitest run

  # ── E2E tests (against Vercel deployment for this commit) ──
  e2e:
    runs-on: ubuntu-latest
    env:
      VERCEL_ORG_ID: team_cpTEoIJuvKaOyBqxMh3Lrksp
      VERCEL_PROJECT_ID: prj_9SQfzeVWoonlR0bo2AjtUjug5RbQ
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Get Vercel deployment URL for this commit
        id: vercel
        run: |
          echo "Looking up deployment for commit: ${GITHUB_SHA}"

          # Fetch the deployment linked to this commit via Vercel API
          DEPLOYMENTS=$(curl -s \
            "https://api.vercel.com/v1/deployments?app=${VERCEL_PROJECT_ID}&meta_githubCommitSha=${GITHUB_SHA}&limit=1" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")

          URL=$(echo "$DEPLOYMENTS" | jq -r '.deployments[0].url // empty')
          STATE=$(echo "$DEPLOYMENTS" | jq -r '.deployments[0].readyState // empty')

          if [ -z "$URL" ]; then
            echo "::error::No Vercel deployment found for commit ${GITHUB_SHA}"
            echo "$DEPLOYMENTS" | jq .
            exit 1
          fi

          echo "url=https://${URL}" >> $GITHUB_OUTPUT
          echo "state=${STATE}" >> $GITHUB_OUTPUT
          echo "Found: https://${URL} (state: ${STATE})"

      - name: Wait for deploy to be READY
        if: steps.vercel.outputs.state != 'READY'
        run: |
          DOMAIN=$(echo "${{ steps.vercel.outputs.url }}" | sed 's|https://||')
          echo "Waiting for deployment: $DOMAIN"

          for i in $(seq 1 36); do
            DATA=$(curl -s \
              "https://api.vercel.com/v1/deployments/get?url=${DOMAIN}" \
              -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}")

            STATE=$(echo "$DATA" | jq -r '.readyState // empty')
            echo "Attempt $i/36 — state: $STATE"

            if [ "$STATE" = "READY" ]; then
              echo "✅ Deployment READY!"
              exit 0
            fi
            sleep 10
          done

          echo "::error::Timeout waiting for deployment to be READY"
          curl -s "https://api.vercel.com/v1/deployments/get?url=${DOMAIN}" \
            -H "Authorization: Bearer ${{ secrets.VERCEL_TOKEN }}" | jq '{readyState, url, createdAt, name}'
          exit 1

      - name: Run E2E tests
        env:
          PLAYWRIGHT_BASE_URL: ${{ steps.vercel.outputs.url }}
        run: npx playwright test

      - name: Upload test results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  # ── Lint / Code quality ──────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - name: Install dependencies
        run: npm ci
      - name: Verify build
        run: npm run build
